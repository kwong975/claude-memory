name: Bug Report
description: Report a problem with claude-memory
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: "Run: claude --version"
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS 15.3, Ubuntu 24.04
